services:
  - type: web
    name: feednomi-staging
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: python server.py
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: OPENAI_VISION_MODEL
        value: gpt-4.1-mini
      - key: OPENAI_API_KEY
        sync: false
      - key: USDA_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_FOOD_LOG_TABLE
        value: food_logs
      - key: SUPABASE_PHOTO_BUCKET
        value: food-photos
